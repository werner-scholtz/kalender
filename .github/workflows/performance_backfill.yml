name: Performance Backfill (one-time)

# Manually-triggered, one-time job that replays the current benchmark suites
# across the historical commits recorded in performance-results, then seeds
# gh-pages/dev/bench/data.js so the dashboard trend has real history. After this
# has run once, the normal "Performance Benchmarks" workflow appends to it.

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Only replay the most recent N commits (blank = all)"
        required: false
        default: ""
      perf_runs:
        description: "Frame profiling repeats per workload (lower = faster)"
        required: false
        default: "2"

permissions:
  contents: write

concurrency:
  group: benchmarks-backfill
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      DISPLAY: :99

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@v2

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y curl git unzip xz-utils zip libglu1-mesa
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev
          sudo apt-get install -y xvfb
          sudo apt-get install -y libegl1-mesa-dev libgl1-mesa-dev libgles2-mesa-dev
          sudo apt-get install -y mesa-common-dev

      - name: Fetch performance-results branch (history source)
        run: git fetch origin performance-results:performance-results

      - name: Start virtual display
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
          sleep 3

      - name: Replay benchmarks across history
        env:
          DISPLAY: :99
          LIMIT: ${{ github.event.inputs.limit }}
          KALENDER_PERF_RUNS: ${{ github.event.inputs.perf_runs }}
        run: bash tools/backfill_benchmarks.sh

      - name: Assemble dashboard seed
        run: python3 tools/build_backfill_data.py --input-dir backfill_results --output data.js

      - name: Upload seed as artifact
        uses: actions/upload-artifact@v4
        with:
          name: backfill-data
          path: |
            data.js
            backfill_results/

      - name: Publish seed to gh-pages/dev/bench
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages
          git checkout gh-pages
          mkdir -p dev/bench
          cp data.js dev/bench/data.js
          git add dev/bench/data.js
          git commit -m "Seed historical benchmark data (one-time backfill)"
          git push origin gh-pages
