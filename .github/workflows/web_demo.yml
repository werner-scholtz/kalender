name: Web Demo

on:
  push:
    branches:
      - main
      - main-wip
    # Release tags only. publish.yml allows a pre-release suffix, this does not:
    # a dev preview goes to pub.dev without redirecting the public demo at it.
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

# Every run deploys to the same gh-pages branch, and pushing main and then a tag
# starts two within seconds of each other. Queue them rather than let them
# interleave.
concurrency:
  group: web-demo-deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # A release tag always rebuilds, so the demo matches the published package.
    # On a branch, rebuild only when asked for, since main can be ahead of the
    # latest release.
    if: startsWith(github.ref, 'refs/tags/') || contains(github.event.head_commit.message, 'web demo')

    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.6
          channel: stable
      - run: flutter build web --release --wasm --base-href /kalender/
        shell: bash
        working-directory: examples/web_demo

      # Publish the built web app to the gh-pages root.
      #
      # keep_files preserves everything already on gh-pages that is not part of
      # this build, most importantly the benchmark data and dashboard under
      # dev/bench. The previous approach force-pushed the whole branch, which
      # wiped the accumulated benchmark history on every deploy.
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: examples/web_demo/build/web
          keep_files: true
