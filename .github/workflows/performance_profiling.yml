name: Performance Benchmarks

on:
  push:
    branches: [main]
  # PRs only run when labelled `profile` (see the job-level `if` below), so this
  # does not run for every PR.
  pull_request:
    branches: [main]
  workflow_dispatch:

# Required so github-action-benchmark can push results to gh-pages and comment
# on pull requests.
permissions:
  contents: write
  pull-requests: write

# Serialise runs that may push to gh-pages so concurrent main pushes don't
# conflict on the data file.
concurrency:
  group: benchmarks-${{ github.ref }}
  cancel-in-progress: false

jobs:
  benchmark:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'profile')
    runs-on: ubuntu-latest

    env:
      DISPLAY: :99

    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y curl git unzip xz-utils zip libglu1-mesa
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev
          sudo apt-get install -y xvfb
          sudo apt-get install -y libegl1-mesa-dev libgl1-mesa-dev libgles2-mesa-dev
          sudo apt-get install -y mesa-common-dev

      # --- Micro-benchmarks (pure Dart, low noise — the primary signal) --------
      - name: Get package dependencies
        run: flutter pub get

      - name: Run micro-benchmarks
        run: flutter test benchmark/micro_benchmark_test.dart

      # --- Frame profiling (flutter drive, higher noise — supplementary) -------
      - name: Get example dependencies
        working-directory: ./examples/testing
        run: flutter pub get

      - name: Start virtual display
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
          sleep 3

      - name: Run frame profiling
        working-directory: ./examples/testing
        env:
          DISPLAY: :99
        run: |
          flutter drive \
            --driver=test_driver/perf_driver.dart \
            --target=integration_test/performance_profiling_test.dart \
            --profile \
            -d linux

      - name: Upload raw timelines
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: timelines-${{ github.run_number }}
          path: examples/testing/build/*.timeline.json
          retention-days: 30

      # --- Publish to the dashboard at gh-pages/dev/bench ----------------------
      # Comment-only: fail-on-alert is false, so regressions are surfaced in a PR
      # comment but never block the build. Alert thresholds sit above the
      # measured noise floors (micro is far tighter than frame). On main we
      # persist (auto-push); on PRs we only compare + comment (save-data-file
      # false) so PR runs never mutate the stored history.
      - name: Store micro-benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Kalender Micro-benchmarks
          tool: customSmallerIsBetter
          output-file-path: build/micro_results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench
          auto-push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          save-data-file: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          comment-always: true
          fail-on-alert: false
          alert-threshold: '125%'
          summary-always: true

      - name: Store frame profiling results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Kalender Frame Profiling
          tool: customSmallerIsBetter
          output-file-path: examples/testing/build/frame_results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench
          auto-push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          save-data-file: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          comment-always: true
          fail-on-alert: false
          alert-threshold: '150%'
          summary-always: true
