# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Analyze and Test

on:
  pull_request:
    branches: [main, main-wip]
  push:
    branches: [main, main-wip]

jobs:
  analyze: # Separate job for analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2

      # The examples are excluded via analysis_options.yaml (analyzer.exclude) and
      # verified by the analyze-examples job below.
      - name: Install dependencies
        run: flutter pub get
        shell: bash
        working-directory: ./

      - name: Formatting check
        run: dart analyze
        shell: bash
        working-directory: ./

      - name: Analyze
        run: flutter analyze
        shell: bash
        working-directory: ./

  analyze-examples: # Analyze and test each example app
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        example:
          - example
          - advanced_example
          - recurrence
          - riverpod
          - ics
          - web_demo
          - testing
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.6
          channel: stable

      - name: Install dependencies
        run: flutter pub get
        shell: bash
        working-directory: ./examples/${{ matrix.example }}

      - name: Analyze
        run: flutter analyze
        shell: bash
        working-directory: ./examples/${{ matrix.example }}

      # The testing harness runs via `flutter drive`, not `flutter test`, so it
      # has no unit test directory. Run tests only where one exists.
      - name: Test
        run: if [ -d test ]; then flutter test; else echo "no test directory, skipping"; fi
        shell: bash
        working-directory: ./examples/${{ matrix.example }}

  test: # Separate job for tests with matrix
    runs-on: ubuntu-latest
    strategy:
      matrix:
        timezone: [
          'America/New_York',
          'Europe/London',
          'Asia/Tokyo',
          'Australia/Sydney',
          'Africa/Johannesburg',
          'UTC'
        ]
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2

      - name: Set Time Zone
        run: sudo timedatectl set-timezone ${{ matrix.timezone }}
        shell: bash

      - name: Verify Time Zone
        run: timedatectl | grep "Time zone"
        shell: bash

      - name: Install dependencies
        run: flutter pub get
        shell: bash
        working-directory: ./

      - name: Run tests (${{ matrix.timezone }})
        run: flutter test
        shell: bash
        working-directory: ./
        env:
          TZ: ${{ matrix.timezone }}